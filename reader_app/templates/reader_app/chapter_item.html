<ul>
    {% for item in items %}
    <li>
        {% if item.dir %}
            <a href="{{ book_dir }}/chapter/{{ item.dir }}">{{ item.name }}</a>
        {% elif item.dir == '' %}
            {{ item.name }}
        {% else %}
            <h3>{{ item.name }}</h3>
        {% endif %}
        
        {% if item.list %}
            {% include "reader_app/chapter_item.html" with items=item.list %}
        {% endif %}
    </li>
    {% endfor %}
</ul>
